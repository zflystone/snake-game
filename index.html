<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 NIGHT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff00;
            --grid-bg: #0d0d24;
            --grid-line: rgba(0, 255, 255, 0.1);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-primary);
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            color: var(--neon-cyan);
            text-shadow:
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan),
                0 0 80px var(--neon-pink);
            letter-spacing: 4px;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from {
                text-shadow:
                    0 0 10px var(--neon-cyan),
                    0 0 20px var(--neon-cyan),
                    0 0 40px var(--neon-cyan);
            }
            to {
                text-shadow:
                    0 0 20px var(--neon-cyan),
                    0 0 40px var(--neon-cyan),
                    0 0 80px var(--neon-pink),
                    0 0 120px var(--neon-pink);
            }
        }

        .canvas-wrapper {
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            border-radius: 8px;
            box-shadow:
                0 0 20px var(--neon-cyan),
                0 0 40px rgba(255, 0, 255, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .canvas-inner {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            background: var(--grid-bg);
        }

        #gameCanvas {
            display: block;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            opacity: 0.3;
        }

        .score-panel {
            display: flex;
            gap: 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
        }

        .score-item {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .score-item span {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .controls-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        .controls-hint kbd {
            display: inline-block;
            padding: 4px 8px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            color: var(--neon-cyan);
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin: 0 4px;
        }

        .mobile-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            gap: 10px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            color: var(--neon-cyan);
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            transition: all 0.15s ease;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .control-btn:active {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .mobile-grid {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
        }

        .mobile-grid .control-btn:nth-child(1) { grid-column: 2; }
        .mobile-grid .control-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
        .mobile-grid .control-btn:nth-child(3) { grid-column: 2; grid-row: 2; }
        .mobile-grid .control-btn:nth-child(4) { grid-column: 3; grid-row: 2; }

        @media (max-width: 768px) {
            .title {
                font-size: 18px;
            }
            
            .mobile-controls {
                display: block;
            }
            
            .controls-hint {
                display: none;
            }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="title">贪吃蛇 NIGHT</h1>
        
        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="canvas-inner">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                <div class="scanlines"></div>
            </div>
        </div>
        
        <div class="score-panel">
            <div class="score-item">SCORE: <span id="score">0</span></div>
            <div class="score-item">HI: <span id="highScore">0</span></div>
        </div>
        
        <div class="controls-hint">
            <kbd>SPACE</kbd> 开始 &nbsp;&nbsp; <kbd>↑↓←→</kbd> 或 <kbd>WASD</kbd> 移动
        </div>
    </div>

    <div class="mobile-controls">
        <div class="mobile-grid">
            <button class="control-btn" data-dir="up">▲</button>
            <button class="control-btn" data-dir="left">◄</button>
            <button class="control-btn" data-dir="down">▼</button>
            <button class="control-btn" data-dir="right">►</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');

        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        const GAME_SPEED = 150;

        const COLORS = {
            snakeHead: '#00ffff',
            snakeTail: '#ff00ff',
            food: '#00ff00',
            grid: 'rgba(0, 255, 255, 0.05)'
        };

        const DIRECTIONS = {
            UP: { x: 0, y: -1 },
            DOWN: { x: 0, y: 1 },
            LEFT: { x: -1, y: 0 },
            RIGHT: { x: 1, y: 0 }
        };

        let gameState = 'start';
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = DIRECTIONS.RIGHT;
        let nextDirection = DIRECTIONS.RIGHT;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameLoop = null;
        let particles = [];

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = DIRECTIONS.RIGHT;
            nextDirection = DIRECTIONS.RIGHT;
            score = 0;
            particles = [];
            scoreEl.textContent = score;
            generateFood();
        }

        function generateFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * GRID_SIZE);
                food.y = Math.floor(Math.random() * GRID_SIZE);
                validPosition = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }

        function drawGrid() {
            ctx.fillStyle = '#0d0d24';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = COLORS.grid;
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                const progress = index / (snake.length - 1);
                
                const r = Math.round(0 + progress * 255);
                const g = Math.round(255 - progress * 255);
                const b = 255;
                
                const x = segment.x * CELL_SIZE;
                const y = segment.y * CELL_SIZE;
                const padding = 2;
                
                const gradient = ctx.createRadialGradient(
                    x + CELL_SIZE / 2, y + CELL_SIZE / 2, 0,
                    x + CELL_SIZE / 2, y + CELL_SIZE / 2, CELL_SIZE
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1)`);
                gradient.addColorStop(1, `rgba(${r * 0.5}, ${g * 0.5}, ${b * 0.5}, 1)`);
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = `rgb(${r}, ${g}, ${b})`;
                ctx.shadowBlur = index === 0 ? 20 : 10;
                
                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, CELL_SIZE - padding * 2, CELL_SIZE - padding * 2, 4);
                ctx.fill();
                
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    let eye1X = x + CELL_SIZE / 2 - eyeOffset;
                    let eye2X = x + CELL_SIZE / 2 + eyeOffset;
                    let eyeY = y + CELL_SIZE / 2;
                    
                    if (direction === DIRECTIONS.UP) {
                        eyeY = y + CELL_SIZE / 3;
                    } else if (direction === DIRECTIONS.DOWN) {
                        eyeY = y + CELL_SIZE * 2 / 3;
                    } else if (direction === DIRECTIONS.LEFT) {
                        [eye1X, eye2X] = [x + CELL_SIZE / 3, x + CELL_SIZE * 2 / 3];
                        eyeY = y + CELL_SIZE / 2;
                    } else if (direction === DIRECTIONS.RIGHT) {
                        [eye1X, eye2X] = [x + CELL_SIZE / 3, x + CELL_SIZE * 2 / 3];
                        eyeY = y + CELL_SIZE / 2;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eyeY, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2X, eyeY, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            ctx.shadowBlur = 0;
        }

        function drawFood() {
            const x = food.x * CELL_SIZE + CELL_SIZE / 2;
            const y = food.y * CELL_SIZE + CELL_SIZE / 2;
            const time = Date.now() / 500;
            const pulse = 1 + Math.sin(time) * 0.2;
            const radius = (CELL_SIZE / 2 - 4) * pulse;
            
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.3, COLORS.food);
            gradient.addColorStop(1, 'rgba(0, 255, 0, 0.3)');
            
            ctx.shadowColor = COLORS.food;
            ctx.shadowBlur = 25 + Math.sin(time) * 10;
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }

        function drawParticles() {
            particles = particles.filter(p => p.life > 0);
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 2;
                
                ctx.fillStyle = `rgba(0, 255, 255, ${p.life / 100})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function createParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x + CELL_SIZE / 2,
                    y: y + CELL_SIZE / 2,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 100
                });
            }
        }

        function drawStartScreen() {
            drawGrid();
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = '16px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 20;
            
            const time = Math.sin(Date.now() / 500) * 0.3 + 0.7;
            ctx.globalAlpha = time;
            ctx.fillText('按 SPACE 开始', canvas.width / 2, canvas.height / 2);
            ctx.globalAlpha = 1;
            
            ctx.font = '10px "Press Start 2P"';
            ctx.fillStyle = '#ff00ff';
            ctx.shadowColor = '#ff00ff';
            ctx.fillText('贪吃蛇 NIGHT', canvas.width / 2, canvas.height / 2 - 40);
            
            ctx.shadowBlur = 0;
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = '14px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ff00ff';
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 20;
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
            
            ctx.font = '12px "Press Start 2P"';
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.fillText(`得分: ${score}`, canvas.width / 2, canvas.height / 2 + 10);
            
            if (score >= highScore && score > 0) {
                ctx.fillStyle = '#ffff00';
                ctx.shadowColor = '#ffff00';
                ctx.fillText('新纪录!', canvas.width / 2, canvas.height / 2 + 40);
            }
            
            const time = Math.sin(Date.now() / 500) * 0.3 + 0.7;
            ctx.globalAlpha = time;
            ctx.font = '10px "Press Start 2P"';
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.fillText('按 SPACE 重新开始', canvas.width / 2, canvas.height / 2 + 80);
            ctx.globalAlpha = 1;
            
            ctx.shadowBlur = 0;
        }

        function update() {
            direction = nextDirection;
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }
            
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                createParticles(food.x * CELL_SIZE, food.y * CELL_SIZE);
                generateFood();
            } else {
                snake.pop();
            }
        }

        function gameOver() {
            gameState = 'gameover';
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            
            canvasWrapper.classList.add('shake');
            setTimeout(() => canvasWrapper.classList.remove('shake'), 300);
        }

        function render() {
            if (gameState === 'start') {
                drawStartScreen();
            } else if (gameState === 'playing') {
                drawGrid();
                drawFood();
                drawParticles();
                drawSnake();
            } else if (gameState === 'gameover') {
                drawGrid();
                drawFood();
                drawSnake();
                drawGameOver();
            }
            
            requestAnimationFrame(render);
        }

        function startGame() {
            initGame();
            gameState = 'playing';
            gameLoop = setInterval(update, GAME_SPEED);
        }

        function handleKeyDown(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState !== 'playing') {
                    startGame();
                }
                return;
            }
            
            if (gameState !== 'playing') return;
            
            switch (e.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (direction !== DIRECTIONS.DOWN) {
                        nextDirection = DIRECTIONS.UP;
                    }
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (direction !== DIRECTIONS.UP) {
                        nextDirection = DIRECTIONS.DOWN;
                    }
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (direction !== DIRECTIONS.RIGHT) {
                        nextDirection = DIRECTIONS.LEFT;
                    }
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (direction !== DIRECTIONS.LEFT) {
                        nextDirection = DIRECTIONS.RIGHT;
                    }
                    break;
            }
        }

        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                
                if (gameState !== 'playing') {
                    startGame();
                    return;
                }
                
                const dir = btn.dataset.dir;
                switch (dir) {
                    case 'up':
                        if (direction !== DIRECTIONS.DOWN) {
                            nextDirection = DIRECTIONS.UP;
                        }
                        break;
                    case 'down':
                        if (direction !== DIRECTIONS.UP) {
                            nextDirection = DIRECTIONS.DOWN;
                        }
                        break;
                    case 'left':
                        if (direction !== DIRECTIONS.RIGHT) {
                            nextDirection = DIRECTIONS.LEFT;
                        }
                        break;
                    case 'right':
                        if (direction !== DIRECTIONS.LEFT) {
                            nextDirection = DIRECTIONS.RIGHT;
                        }
                        break;
                }
            });
        });

        document.addEventListener('keydown', handleKeyDown);
        
        render();
    </script>
</body>
</html>
